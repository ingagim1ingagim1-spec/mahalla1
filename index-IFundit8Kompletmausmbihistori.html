    async function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const error = document.getElementById('errorMsg');
        try {
            const { ref, get } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
            const snapshot = await get(ref(window.db, 'settings'));
            const settings = snapshot.val() || { adminUser: "admin", adminPass: "gjeneza2024" };
            if (u === settings.adminUser && p === settings.adminPass) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else { error.innerText = "Përdoruesi ose fjalëkalimi i gabuar!"; }
        } catch (e) {
            if(u === "admin" && p === "gjeneza2024") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }
        }
    }

    async function changeAdminUser() {
        const pin = prompt("🔐 Shkruaj PIN-in 12-shifror:");
        if (pin === ADMIN_CHANGE_PIN) {
            const newUser = prompt("Përdoruesi i ri:");
            if (newUser) {
                const { ref, set } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
                await set(ref(window.db, 'settings/adminUser'), newUser);
                alert("✅ Përdoruesi u ndryshua!");
            }
        }
    }

    async function changeAdminPassword() {
        const pin = prompt("🔐 Shkruaj PIN-in 12-shifror:");
        if (pin === ADMIN_CHANGE_PIN) {
            const newPass = prompt("Fjalëkalimi i ri:");
            if (newPass) {
                const { ref, set } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
                await set(ref(window.db, 'settings/adminPass'), newPass);
                alert("✅ Fjalëkalimi u ndryshua!");
            }
        }
    }

<script type="module">

    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
   

   // FUNKSIONI I PLOTË PËR IMPORTIMIN E JSON
    window.importJSON = async function(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
        const text = await file.text();
        const data = JSON.parse(text);

        for (let item of data) {
            await set(ref(db, 'anetaret/' + item.id), item);
        }

        alert("✅ Importi i JSON u krye me sukses!");
    } catch (err) {
        console.error(err);
        alert("❌ Gabim gjatë importimit të JSON: " + err.message);
    }


    event.target.value = ""; // lejon zgjedhjen e të njëjtit skedar përsëri
};

    const firebaseConfig = {

    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

<script>
    // kam shtuar Funksioni për të llogaritur statistikat e gjenezës
    function llogaritStatistikat(data) {
    let total = 0;
    let maxGjenerata = 0;
    // Kam shtuar variabla për të numëruar anëtarët e gjallë dhe të vdekur
    let teGjalle = 0;
    let teVdekur = 0;



    function vizito(node, niveli) {
        total++;
         // Kam shtuar llogaritjen e anëtarëve të gjallë dhe të vdekur bazuar në fushën "alive"   if (node.alive === false)
        if (node.alive === false) {
            teVdekur++;
        } else {
            teGjalle++;
        }


        if (niveli > maxGjenerata) maxGjenerata = niveli;
        
        if (node.children && node.children.length > 0) {
            node.children.forEach(child => vizito(child, niveli + 1));
        }
    }

    data.forEach(m => vizito(m, 1));

    // Këtu i dërgojmë shifrat te HTML-ja
    document.getElementById('statTotal').innerText = total;
    document.getElementById('statGen').innerText = maxGjenerata;
    // Kam shtuar shfaqjen e numrit të anëtarëve të gjallë dhe të vdekur në HTML
    document.getElementById('statAlive').innerText = teGjalle;
    document.getElementById('statDead').innerText = teVdekur;
}
    // Funksioni kryesor për të shfaqur pemën

    // Funksioni rekursiv për të gjeneruar HTML për pasardhësit
    function generateDescendantsHtml(node, path, canEdit, level = 0) {
        if (!node.children || node.children.length === 0) return '';
        
        let html = '';
        node.children.forEach((child, index) => {
            const childPath = path + ',' + index;
            html += `
                <div class="child-item" style="margin-left: ${level * 10}px;">
                    <div class="child-header">
                        <img src="${child.photo || 'https://via.placeholder.com/40'}" class="child-photo-small">
                        <div style="flex:1;">
                            <b style="${child.alive === false ? 'color:red;' : ''}">${child.name}</b><br>
                            <small>📅 ${child.dob || ''}</small>
                        </div>
                        <div class="action-buttons ${canEdit ? '' : 'hidden'}">
                            <button class="btn btn-edit" onclick="openEditModal('${childPath}')" style="padding:2px 5px; font-size:10px;" title="Edito">✏️</button>
                            <button class="btn btn-child-add" onclick="openAddDescendantModal('${childPath}')" style="padding:2px 5px; font-size:10px;" title="Shto Pasardhës">+</button>
                            <button class="btn btn-delete" onclick="deleteDescendant('${childPath}')" style="padding:2px 5px; font-size:10px;" title="Fshij">🗑️</button>
                        </div>
                    </div>`;
            
            if (child.history) {
                html += `<div style="font-size:11px; color:#666; margin-left:52px; margin-bottom:5px; font-style:italic;">📝 ${child.history.substring(0,50)}${child.history.length > 50 ? '...' : ''}</div>`;
            }
            
            if (child.children && child.children.length > 0) {
                html += `<div class="grandchild-grid">`;
                html += generateDescendantsHtml(child, childPath, canEdit, level + 1);
                html += `</div>`;
            }
            
            html += `</div>`;
        });
        
        return html;
    }

    function findNodeByPath(path) {
        const parts = path.split(',');
        const rootId = parts[0];
        const root = window.familyData.find(m => m.id === rootId);
        if (!root) return null;
        
        if (parts.length === 1) return root;
        
        let currentNode = root;
        for (let i = 1; i < parts.length; i++) {
            const index = parseInt(parts[i]);
            if (!currentNode.children || !currentNode.children[index]) return null;
            currentNode = currentNode.children[index];
        }
        return currentNode;
    }

    function getParentAndIndex(path) {
        const parts = path.split(',');
        if (parts.length === 1) return { parent: null, index: null, rootId: parts[0] };
        
        const parentPath = parts.slice(0, -1).join(',');
        const index = parseInt(parts[parts.length - 1]);
        const parent = findNodeByPath(parentPath);
        return { parent, index, rootId: parts[0] };
    }

    async function deleteCurrentMember() {
        if (!confirm('A jeni i sigurt që doni të fshini këtë anëtar?')) return;
        
        const path = currentEditPath;
        const { parent, index, rootId } = getParentAndIndex(path);
        
        if (!parent) {
            await deleteMember(rootId);
        } else {
            parent.children.splice(index, 1);
            const root = window.familyData.find(m => m.id === rootId);
            const { ref, set } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
            await set(ref(window.db, 'anetaret/' + rootId), root);
        }
        
        closeEditModal();
    }

    if (!window.familyData || window.familyData.length === 0) {
        alert("Nuk ka të dhëna për të shkarkuar!");

    }

    // Konvertojmë të dhënat në formatin JSON me hapësira për t'u lexuar më lehtë
    const dataStr = JSON.stringify(window.familyData, null, 4);
    
    // Krijojmë një Blob (objekt binar) me të dhënat JSON
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);

    // Krijojmë një element "a" të padukshëm për të simuluar klikimin dhe shkarkimin
    const exportFileDefaultName = 'antaret.json';
    const linkElement = document.createElement('a');
    linkElement.setAttribute('href', dataUri);
    linkElement.setAttribute('download', exportFileDefaultName);
    
    // Ekzekutojmë shkarkimin
    document.body.appendChild(linkElement);
    linkElement.click();
    document.body.removeChild(linkElement);
}

    // Funksion rekursiv për filtrimin
    function filtroNode(node) {
        let match = false;

        // Kontrollo vetë node
        if (
            (node.name && node.name.toLowerCase().includes(term)) ||
            (node.father && node.father.toLowerCase().includes(term)) ||
            (node.mother && node.mother.toLowerCase().includes(term)) ||
            (node.personalNo && node.personalNo.toLowerCase().includes(term)) ||
            (node.birthplace && node.birthplace.toLowerCase().includes(term))
        ) {
            match = true;
        }

        let filteredChildren = [];

        if (node.children && node.children.length > 0) {
            node.children.forEach(child => {
                const result = filtroNode(child);
                if (result) {
                    filteredChildren.push(result);
                    match = true;
                }
            });
        }

        if (match) {
            return {
                ...node,
                children: filteredChildren
            };
        }

        return null;
    }

    const filteredData = [];

    window.familyData.forEach(member => {
        const result = filtroNode(member);
        if (result) filteredData.push(result);
    });

    renderTree(filteredData);
}
</script>
